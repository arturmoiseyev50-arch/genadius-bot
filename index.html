<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genadius Service</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #007AFF; --bg: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        /* Адаптивность: на ПК ограничим ширину, на телефоне — на весь экран */
        .wrapper { max-width: 500px; margin: 0 auto; }
        
        .logo-block { text-align: center; margin-bottom: 20px; }
        .logo { width: 80px; height: 80px; background: #007AFF; color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; margin: 0 auto 10px; }
        
        h1 { font-size: 32px; line-height: 1.2; color: #000; text-align: center; margin-bottom: 30px; }
        
        .field-group { margin-bottom: 25px; }
        label { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 10px; display: block; }
        
        /* Большие поля для удобства */
        select, textarea, input { width: 100%; border: 2px solid #EEE; padding: 18px; border-radius: 16px; font-size: 18px; box-sizing: border-box; }
        
        button { width: 100%; background: #000; color: white; border: none; padding: 20px; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="logo-block">
            <div class="logo">G</div> <p style="color: #888;">COMPANY GENADIUS</p>
        </div>

        <h1>Ремонт двухконтурных котлов и кондиционеров</h1>

        <div class="field-group">
            <label>ТИП УСЛУГИ</label>
            <select id="service">
                <option value="Котел">Ремонт двухконтурных котлов</option>
                <option value="Кондиционер">Ремонт кондиционеров</option>
            </select>
        </div>

        <button onclick="submitForm()">ОТПРАВИТЬ ЗАЯВКУ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function submitForm() {
            const data = { service: document.getElementById('service').value };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
