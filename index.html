<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genadius Service</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .logo { width: 200px; height: auto; margin-bottom: 20px; }
        h1 { font-size: 22px; margin-bottom: 20px; }
        select { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>Ремонт двухконтурных котлов и кондиционеров</h1>
        <select id="service">
            <option value="Ремонт котла">Ремонт двухконтурных котлов</option>
            <option value="Ремонт кондиционера">Ремонт кондиционеров</option>
        </select>
        <button onclick="submitForm()">ОТПРАВИТЬ ЗАЯВКУ</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function submitForm() {
            const data = { service: document.getElementById('service').value };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
