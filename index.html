<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генадиус - Заявка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; }
        .form-group { margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0088cc; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Сервис "Генадиус"</h2>
        <div class="form-group">
            <label>Тип оборудования:</label>
            <select id="service">
                <option value="Котел">Ремонт котла</option>
                <option value="Кондиционер">Ремонт кондиционера</option>
            </select>
        </div>
        <div class="form-group">
            <label>Описание проблемы:</label>
            <textarea id="desc" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label>Ваш номер телефона:</label>
            <input type="tel" id="phone" placeholder="+7 (999) 000-00-00">
        </div>
        <button id="mainButton" onclick="submitForm()">ОТПРАВИТЬ ЗАЯВКУ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        function submitForm() {
            const data = {
                service: document.getElementById('service').value,
                desc: document.getElementById('desc').value,
                phone: document.getElementById('phone').value,
                user: tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Гость"
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
