<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genadius Service</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #fff; margin: 0; padding: 20px; }
        .wrapper { max-width: 500px; margin: 0 auto; text-align: center; }
        
        /* Логотип */
        .logo { width: 200px; height: auto; margin-bottom: 20px; }
        
        h1 { font-size: 24px; color: #000; margin-bottom: 30px; line-height: 1.3; }
        
        .field-group { text-align: left; margin-bottom: 25px; }
        label { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 10px; display: block; }
        
        select { width: 100%; border: 2px solid #EEE; padding: 16px; border-radius: 16px; font-size: 16px; box-sizing: border-box; background-color: #f9f9f9; }
        
        button { width: 100%; background: #000; color: #fff; border: none; padding: 20px; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="logo.png" alt="Genadius Logo" class="logo">
        
        <h1>Ремонт двухконтурных котлов и кондиционеров</h1>

        <div class="field-group">
            <label>ТИП УСЛУГИ</label>
            <select id="service">
                <option value="Ремонт двухконтурного котла">Ремонт двухконтурных котлов</option>
                <option value="Ремонт кондиционера">Ремонт кондиционеров</option>
            </select>
        </div>

        <button onclick="submitForm()">ОТПРАВИТЬ ЗАЯВКУ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        
        function submitForm() {
            const data = { 
                service: document.getElementById('service').value 
            };
            // Отправляем данные в бот
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
