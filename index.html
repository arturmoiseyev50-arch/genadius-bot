<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genadius Service</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #007AFF; --bg: #F2F2F7; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; color: #1C1C1E; margin: 0; }
        .header p { color: #8E8E93; font-size: 14px; }
        .card { background: white; padding: 24px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .label { font-size: 13px; font-weight: 600; color: #8E8E93; margin-bottom: 8px; display: block; }
        select, textarea, input { width: 100%; border: none; background: #F2F2F7; padding: 16px; border-radius: 12px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Генадиус</h1>
        <p>Профессиональный сервис оборудования</p>
    </div>
    <div class="card">
        <label class="label">ВЫБЕРИТЕ УСЛУГУ</label>
        <select id="service">
            <option>Ремонт котла</option>
            <option>Ремонт кондиционера</option>
        </select>
        
        <label class="label">ОПИСАНИЕ ПРОБЛЕМЫ</label>
        <textarea id="desc" placeholder="Что случилось?"></textarea>

        <button onclick="submitForm()">ОТПРАВИТЬ ЗАЯВКУ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.text = "ОТПРАВИТЬ";
        
        function submitForm() {
            const data = {
                service: document.getElementById('service').value,
                desc: document.getElementById('desc').value,
                user: tg.initDataUnsafe.user?.first_name
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
